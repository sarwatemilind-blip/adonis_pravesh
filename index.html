<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pravesh · Adonis Laboratories Recruitment</title>
<style>
  :root{
    --teal-deep:#0B4F5C;
    --teal-mid:#147389;
    --teal-bright:#1B92AC;
    --sky:#E3F4F7;
    --red:#D8392E;
    --red-dark:#B62E25;
    --ink:#16212B;
    --slate:#5C6B78;
    --slate-light:#8A97A2;
    --line:#E1E8EA;
    --line-soft:#EEF3F4;
    --paper:#F6FAFA;
    --white:#FFFFFF;
    --amber:#A6720E;
    --amber-bg:#FBF1DD;
    --green:#256B45;
    --green-bg:#E5F3EA;
    --red-text:#A6332B;
    --red-bg:#FBEAE8;
    --blue-bg:#E9F2F5;
    --radius:10px;
    --radius-sm:6px;
    --shadow-sm:0 1px 2px rgba(11,40,46,.05);
    --shadow:0 2px 4px rgba(11,40,46,.05), 0 8px 20px rgba(11,40,46,.06);
    --shadow-lg:0 8px 30px rgba(11,40,46,.14);
    --font-display: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-body: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:var(--teal-mid);}

  /* ---------- Topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    background:var(--white);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1180px;margin:0 auto;
    display:flex;align-items:center;gap:14px;
    padding:10px 20px;
  }
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand img{height:30px;display:block;}
  .brand-text{display:flex;flex-direction:column;line-height:1.1;}
  .brand-name{font-weight:800;font-size:19px;color:var(--teal-deep);letter-spacing:-0.01em;}
  .brand-sub{font-size:10.5px;color:var(--slate);letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
  .brand-hindi{font-size:11px;color:var(--red);font-weight:700;margin-left:2px;}

  .role-tabs{
    display:flex;gap:4px;margin-left:auto;background:var(--paper);
    border:1px solid var(--line);border-radius:999px;padding:3px;
  }
  .role-tab{
    border:none;background:transparent;padding:7px 14px;border-radius:999px;
    font-size:13px;font-weight:600;color:var(--slate);white-space:nowrap;
    transition:all .15s ease;
  }
  .role-tab.active{background:var(--teal-deep);color:white;box-shadow:var(--shadow-sm);}
  .role-tab:not(.active):hover{color:var(--ink);}

  .app-main{max-width:1180px;margin:0 auto;padding:24px 20px 60px;min-height:70vh;}

  .footer{
    text-align:center;padding:18px 20px 28px;color:var(--slate-light);font-size:11.5px;
  }
  .footer b{color:var(--slate);}

  /* ---------- Generic layout bits ---------- */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
  .page-head h1{font-size:23px;font-weight:800;color:var(--ink);}
  .page-head .sub{color:var(--slate);font-size:13px;margin-top:3px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-mid);margin-bottom:4px;display:block;}

  .btn{
    border:1px solid var(--line);background:var(--white);color:var(--ink);
    padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;transition:all .12s ease;
  }
  .btn:hover{border-color:var(--slate-light);background:var(--paper);}
  .btn-primary{background:var(--teal-deep);border-color:var(--teal-deep);color:white;}
  .btn-primary:hover{background:var(--teal-mid);border-color:var(--teal-mid);}
  .btn-red{background:var(--red);border-color:var(--red);color:white;}
  .btn-red:hover{background:var(--red-dark);border-color:var(--red-dark);}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--teal-mid);padding:9px 10px;}
  .btn-ghost:hover{background:var(--blue-bg);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn-block{width:100%;justify-content:center;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
  .card-pad{padding:20px;}
  .card-head{padding:16px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .card-head h3{font-size:15px;font-weight:700;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  @media (max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr;}}

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field label{font-size:12.5px;font-weight:700;color:var(--ink);}
  .field .hint{font-size:11.5px;color:var(--slate-light);font-weight:400;}
  .field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=date],
  .field input[type=number],.field select,.field textarea{
    border:1px solid var(--line);border-radius:7px;padding:9px 11px;background:var(--white);
    color:var(--ink);width:100%;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal-bright);outline-offset:0;border-color:var(--teal-bright);}
  .field textarea{resize:vertical;min-height:64px;}
  .radio-row,.check-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:8px 0 2px;}
  .radio-opt,.check-opt{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;}
  .radio-opt input,.check-opt input{width:16px;height:16px;}

  fieldset.section{border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  fieldset.section legend{font-weight:800;font-size:13.5px;color:var(--teal-deep);padding:0 6px;}

  table.tbl{width:100%;border-collapse:collapse;font-size:13px;}
  table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);padding:7px 8px;border-bottom:1px solid var(--line);}
  table.tbl td{padding:6px 8px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
  table.tbl input,table.tbl select{border:1px solid var(--line);border-radius:5px;padding:6px 7px;width:100%;font-size:12.5px;}
  .row-actions{display:flex;justify-content:flex-end;margin-top:8px;}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .badge-invited{background:var(--blue-bg);color:var(--teal-deep);}
  .badge-submitted{background:#EFEAFB;color:#5B3FA6;}
  .badge-under_review{background:var(--amber-bg);color:var(--amber);}
  .badge-interview_rated{background:#FDEFE3;color:#A65A0E;}
  .badge-hr_review{background:#E8ECFB;color:#3949A6;}
  .badge-approved{background:var(--green-bg);color:var(--green);}
  .badge-rejected{background:var(--red-bg);color:var(--red-text);}

  /* ---------- Stepper / journey track (signature element) ---------- */
  .journey{display:flex;align-items:flex-start;margin:6px 0 22px;overflow-x:auto;padding-bottom:4px;}
  .journey-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:78px;position:relative;}
  .journey-line{position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0;}
  .journey-step:first-child .journey-line{display:none;}
  .journey-line.done{background:var(--teal-mid);}
  .journey-dot{width:26px;height:26px;border-radius:50%;background:var(--white);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--slate-light);z-index:1;}
  .journey-dot.done{background:var(--teal-mid);border-color:var(--teal-mid);color:white;}
  .journey-dot.current{background:var(--white);border-color:var(--teal-deep);color:var(--teal-deep);box-shadow:0 0 0 4px var(--sky);}
  .journey-dot.rejected{background:var(--red);border-color:var(--red);color:white;}
  .journey-label{font-size:10.5px;margin-top:6px;color:var(--slate);text-align:center;font-weight:600;max-width:90px;}
  .journey-step.current .journey-label{color:var(--teal-deep);}

  .notif-list{display:flex;flex-direction:column;gap:0;}
  .notif-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft);}
  .notif-item:last-child{border-bottom:none;}
  .notif-icon{width:26px;height:26px;border-radius:7px;background:var(--blue-bg);color:var(--teal-deep);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .notif-body .to{font-size:12.5px;font-weight:700;}
  .notif-body .subj{font-size:12.5px;color:var(--ink);}
  .notif-body .ts{font-size:11px;color:var(--slate-light);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--slate);}
  .empty-state .ic{font-size:34px;margin-bottom:10px;}
  .empty-state h3{font-size:15px;color:var(--ink);margin-bottom:4px;}
  .empty-state p{font-size:13px;}

  .toast-root{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:320px;}
  .toast{background:var(--ink);color:white;padding:11px 14px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);display:flex;gap:8px;align-items:flex-start;animation:slidein .2s ease;}
  @keyframes slidein{from{transform:translateY(-8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .modal-overlay{position:fixed;inset:0;background:rgba(11,30,35,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:white;border-radius:14px;max-width:480px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow-lg);}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{font-size:16px;}
  .modal-body{padding:20px;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
  .x-close{background:none;border:none;font-size:20px;color:var(--slate);line-height:1;padding:4px;}

  .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .codepill{font-family:var(--font-mono);background:var(--sky);color:var(--teal-deep);padding:8px 12px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.04em;}

  .sidecard-list{display:flex;flex-direction:column;gap:10px;}
  .stat{display:flex;flex-direction:column;}
  .stat .n{font-size:24px;font-weight:800;color:var(--teal-deep);}
  .stat .l{font-size:11.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}

  .doc-group{margin-bottom:16px;}
  .doc-group h4{font-size:13px;font-weight:800;margin-bottom:8px;color:var(--ink);}
  .doc-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:7px;background:var(--paper);}
  .doc-item.attached{border-color:#BCE0CB;background:var(--green-bg);}
  .doc-item .name{font-size:13px;font-weight:600;}
  .doc-item .opt{font-size:11px;color:var(--slate-light);font-weight:500;}
  .doc-item .file-info{font-size:11.5px;color:var(--green);font-weight:600;}
  .file-btn{position:relative;overflow:hidden;display:inline-flex;}
  .file-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}

  .wizard-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:12px;}
  .wizard-dot{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--paper);color:var(--slate);border:1px solid var(--line);}
  .wizard-dot.active{background:var(--teal-deep);color:white;border-color:var(--teal-deep);}
  .wizard-dot.complete{background:var(--green-bg);color:var(--green);border-color:#BCE0CB;}

  .verify-table td.cmt input{font-size:12px;}
  .yn-toggle{display:flex;gap:4px;}
  .yn-toggle button{border:1px solid var(--line);background:white;padding:4px 10px;font-size:11.5px;font-weight:700;border-radius:6px;color:var(--slate);}
  .yn-toggle button.on-yes.active{background:var(--green-bg);color:var(--green);border-color:#BCE0CB;}
  .yn-toggle button.on-no.active{background:var(--red-bg);color:var(--red-text);border-color:#F3C9C5;}

  .banner{border-radius:var(--radius);padding:14px 16px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;}
  .banner.info{background:var(--blue-bg);color:var(--teal-deep);}
  .banner.warn{background:var(--amber-bg);color:var(--amber);}
  .banner.success{background:var(--green-bg);color:var(--green);}
  .banner.danger{background:var(--red-bg);color:var(--red-text);}

  .two-col{display:grid;grid-template-columns:1.7fr 1fr;gap:18px;align-items:flex-start;}
  @media (max-width:900px){.two-col{grid-template-columns:1fr;}}

  .micro{font-size:11px;color:var(--slate-light);}
  .divider{height:1px;background:var(--line);margin:16px 0;}

  @media (max-width:640px){
    .topbar-inner{flex-wrap:wrap;}
    .role-tabs{order:3;width:100%;margin-left:0;margin-top:8px;justify-content:space-between;}
    .role-tab{flex:1;text-align:center;padding:8px 6px;}
    .page-head{flex-direction:column;align-items:flex-start;}
    table.tbl{display:block;overflow-x:auto;white-space:nowrap;}
  }
</style>

<style>
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:32px 28px;max-width:380px;width:100%;box-shadow:var(--shadow-lg);}
.login-logo{text-align:center;margin-bottom:18px;}
.login-logo img{height:40px;}
.login-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px;color:var(--teal-deep);}
.login-sub{font-size:13px;text-align:center;color:var(--slate);margin-bottom:20px;}
.mgr-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;}
.mgr-avatar{width:34px;height:34px;border-radius:50%;background:var(--teal-deep);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.mgr-info{flex:1;min-width:0;}
.mgr-name{font-weight:700;font-size:13.5px;}
.mgr-id{font-size:11px;color:var(--slate-light);}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

        <img id="brandLogo" alt="Adonis Laboratories">

          <span class="brand-name">Pravesh<span class="brand-hindi">&#x092A;&#x094D;&#x0930;&#x0935;&#x0947;&#x0936;</span></span>

  <main class="app-main" id="app"></main>

async function persistCandidate(record) {
  if (!isOnline) {
    offlineQueue.push({ table: 'candidates', data: record });
    return;
  }
  try {
    const { error } = await supa.from('candidates').upsert({
      id: record.id,
      name: record.name,
      email: record.email,
      phone: record.phone || '',
      position: record.position || '',
      source: record.source || '',
      status: record.status || 'invited',
      manager_id: record.managerId || null,
      application: record.application || {},
      documents: record.documents || {},
      rating_sheet: record.ratingSheet || null,
      hr_decision: record.hrDecision || null,
      offer_letter: record.offerLetter || null,
      notifications: record.notifications || [],
      updated_at: new Date(record.updatedAt || Date.now()).toISOString()
    });
    if (error) throw error;
  } catch (e) {
    console.warn('Supabase persist failed, queuing offline', e);
    offlineQueue.push({ table: 'candidates', data: record });
  }
}

async function persistManager(record) {
  if (!isOnline) {
    offlineQueue.push({ table: 'managers', data: record });
    return { success: true, offline: true };
  }
  try {
    const { error } = await supa.from('managers').upsert({
      id: record.id,
      username: record.username,
      name: record.name,
      password: record.password,
      email: record.email,
      created_at: new Date(record.createdAt || Date.now()).toISOString()
    });
    if (error) throw error;
    return { success: true };
  } catch (e) {
    console.warn('Supabase persist failed', e);
    return { success: false, error: e };
  }
}

async function loadFromStorage() {
  try {
    const [{data: mgrs, error: mgrsErr}, {data: cands, error: candsErr}, {data: elogs, error: elogsErr}] = await Promise.all([
      supa.from('managers').select('*'),
      supa.from('candidates').select('*'),
      supa.from('email_log').select('*')
    ]);
    
    if (mgrsErr) console.error("Error loading managers:", mgrsErr);
    if (candsErr) console.error("Error loading candidates:", candsErr);
    if (elogsErr) console.error("Error loading email logs:", elogsErr);
    
    if (mgrs) {
      mgrs.forEach(m => {
        DB.managers[m.id] = {
          id: m.id,
          name: m.name,
          username: m.username,
          password: m.password,
          email: m.email,
          createdAt: m.created_at ? new Date(m.created_at).getTime() : Date.now()
        };
      });
    }
    console.log("Loaded managers:", Object.keys(DB.managers).length);
    
    if (cands) {
      cands.forEach(c => {
        DB.candidates[c.id] = {
          id: c.id,
          name: c.name,
          email: c.email,
          phone: c.phone,
          position: c.position,
          source: c.source,
          status: c.status,
          managerId: c.manager_id,
          application: c.application || {},
          documents: c.documents || {},
          managerReview: c.manager_review || {notes: ''},
          ratingSheet: c.rating_sheet,
          hrDecision: c.hr_decision,
          offerLetter: c.offer_letter,
          notifications: c.notifications || [],
          updatedAt: new Date(c.updated_at).getTime()
        };
      });
      DB.index = cands.map(c => ({
        id: c.id, name: c.name, email: c.email, position: c.position, 
        status: c.status, managerId: c.manager_id, updatedAt: new Date(c.updated_at).getTime()
      }));
    }
    
    DB.email_logs = elogs || [];
    
    const ap = await window.storage?.get('prv_adminPass', true).catch(()=>null);
    if(ap && ap.status==='fulfilled' && ap.value) DB.adminPass = ap.value.value;
  } catch(e) {
    console.error('Failed to load from Supabase', e);
  }
}

function esc(s){ if(s==null) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ return ts ? new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function fmtDT(ts)  { return ts ? new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }
function genCode()  { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function genId()    { return crypto.randomUUID(); }
function avatar(name){ return (name||'?')[0].toUpperCase(); }

function getDeep(obj,path){
  return path.replace(/\[(\d+)\]/g,'.$1').split('.').filter(Boolean).reduce((c,p)=>c==null?undefined:c[p],obj);
}
function setDeep(obj,path,value){
  const parts=path.replace(/\[(\d+)\]/g,'.$1').split('.').filter(Boolean);
  let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i],next=parts[i+1],isIdx=/^\d+$/.test(next);
    if(cur[p]==null) cur[p]=isIdx?[]:{};
    cur=cur[p];
  }
  cur[parts[parts.length-1]]=value;
}
function debounce(fn,ms){ let t; return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);}; }
function bindForm(el,obj,cb){
  const h=e=>{const el=e.target; if(!el.name) return; const v=el.type==='checkbox'?el.checked:el.value; setDeep(obj,el.name,v); if(cb) cb();};
  el.addEventListener('input',h); el.addEventListener('change',h);
}
function fillForm(el,obj){
  el.querySelectorAll('[name]').forEach(i=>{
    const v=getDeep(obj,i.name);
    if(i.type==='checkbox') i.checked=!!v;
    else if(i.type==='radio') i.checked=(i.value===v);
    else i.value=(v==null?'':v);
  });
}

function toast(msg,icon='📧'){
  const root=document.getElementById('toastRoot');
  if(!root) return;
  const div=document.createElement('div'); div.className='toast';
  div.innerHTML=`<span>${icon}</span><span>${esc(msg)}</span>`;
  root.appendChild(div);
  setTimeout(()=>{div.style.transition='opacity .3s';div.style.opacity='0';setTimeout(()=>div.remove(),300);},3800);
}
function statusBadge(s){ return `<span class="badge badge-${s}">${STAGE_LABELS[s]||s}</span>`; }
function emptyState(ic,t,s){ return `<div class="empty-state"><div class="ic">${ic}</div><h3>${t}</h3><p>${s}</p></div>`; }
function statCard(l,n){ return `<div class="card card-pad stat"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
function kv(l,v){ return `<div><b>${esc(l)}:</b> ${esc(v||'—')}</div>`; }
function ynField(l,n){ return `<div class="field"><label>${l}</label><div class="radio-row"><label class="radio-opt"><input type="radio" name="${n}" value="Yes"> Yes</label><label class="radio-opt"><input type="radio" name="${n}" value="No"> No</label></div></div>`; }
function arrTable(arr,cols){
  if(!arr||!arr.length) return '<p class="micro">None provided.</p>';
  return `<table class="tbl"><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead><tbody>${arr.map(row=>`<tr>${cols.map(c=>{let v=row?row[c.key]:null; if(c.bool) v=v?'✓':'—'; return `<td>${esc(v==null||v===''?'—':String(v))}</td>`;}).join('')}</tr>`).join('')}</tbody></table>`;
}
function ensureModalRoot(){ let r=document.getElementById('modalRoot'); if(!r){r=document.createElement('div');r.id='modalRoot';document.getElementById('app').appendChild(r);} return r; }

function stepperHTML(status){
  if(status==='rejected') return `<div class="banner danger"><strong>✕</strong> This application was not progressed further.</div>`;
  const idx=STAGE_ORDER.indexOf(status);
  return '<div class="journey">'+STAGE_ORDER.map((s,i)=>{
    const done=i<idx,cur=i===idx;
    return `<div class="journey-step ${cur?'current':''}"><div class="journey-line ${(done||cur)?'done':''}"></div><div class="journey-dot ${done?'done':(cur?'current':'')}">${done?'✓':(i+1)}</div><div class="journey-label">${STAGE_LABELS[s]}</div></div>`;
  }).join('')+'</div>';
}

/* add manager modal */
function showAddMgrModal(){
  const root=ensureModalRoot();
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)App.closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>Add manager account</h3><button class="x-close" onclick="App.closeModal()">×</button></div>
      <div class="modal-body" id="amForm">
        <div class="banner info" style="margin-bottom:14px">The Manager ID is what the hiring manager uses to log in. Share their credentials securely.</div>
        <div class="field"><label>Full name *</label><input type="text" name="name" placeholder="e.g. Rajesh Kumar"></div>
        <div class="field"><label>Manager ID (username) *</label><input type="text" name="username" placeholder="e.g. rajesh.kumar or RK01" autocomplete="off"></div>
        <div class="field"><label>Email address *</label><input type="email" name="email" placeholder="e.g. rajesh@adonislabs.com"></div>
        <div class="field"><label>Password *</label><input type="password" name="password" placeholder="Set a secure password" autocomplete="new-password"></div>
        <div class="field"><label>Confirm password *</label><input type="password" name="confirmPw" placeholder="Repeat password" autocomplete="new-password"></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="App.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.createMgr()">Create account</button>
      </div>
    </div>
  </div>`;
}

function createMgr(){
  const form=document.getElementById('amForm');
  const g=n=>form.querySelector('[name='+n+']').value.trim();
  const name=g('name'),username=g('username'),password=g('password'),confirmPw=g('confirmPw'),email=g('email');
  if(!name||!username||!password||!email){ toast('Please fill all required fields','⚠️'); return; }
  if(password!==confirmPw){ toast('Passwords do not match','⚠️'); return; }
  if(Object.values(DB.managers).some(m=>m.username===username)){ toast('That Manager ID is already taken. Choose a different one.','⚠️'); return; }
  const id=genId();
  DB.managers[id]={id,name,username,password,email,createdAt:Date.now()};
  persistManager(DB.managers[id]);
  toast(`Manager account created for ${name}`,'✅');
  closeModal(); render();
}

function deleteMgr(id){
  const mgr=DB.managers[id];
  if(!mgr) return;
  if(!confirm(`Remove manager account for "${mgr.name}"? Their candidates will remain in the system.`)) return;
  delete DB.managers[id];
  persist(); render();
}

  const root=ensureModalRoot();

      <div class="modal-head"><h3>Change admin password</h3><button class="x-close" onclick="App.closeModal()">×</button></div>

        <div class="field"><label>Current password</label><input type="password" id="cpCurrent"></div>
        <div class="field"><label>New password</label><input type="password" id="cpNew"></div>
        <div class="field"><label>Confirm new password</label><input type="password" id="cpConfirm"></div>
      </div>
      <div class="modal-foot"><button class="btn" onclick="App.closeModal()">Cancel</button><button class="btn btn-primary" onclick="App.changePw()">Update password</button></div>
    </div>

}
function changePw(){
  const cur=document.getElementById('cpCurrent').value;
  const nw =document.getElementById('cpNew').value;
  const cnf=document.getElementById('cpConfirm').value;
  if(cur!==DB.adminPass){ toast('Current password is incorrect','❌'); return; }
  if(!nw||nw!==cnf){ toast('New passwords do not match','⚠️'); return; }
  DB.adminPass=nw; persist();
  toast('Admin password updated successfully','✅'); closeModal();
}

function hrDecisionPanel(r){
  if(r.status==='rejected')
    return `<div class="banner danger">✕ Rejected by ${esc((r.hrDecision&&r.hrDecision.decidedBy)||'HR')} on ${r.hrDecision?fmtDate(r.hrDecision.decidedDate):''}${r.hrDecision&&r.hrDecision.comments?'<br>Note: '+esc(r.hrDecision.comments):''}</div>`;
  if(r.status==='approved')
    return `<div class="card card-pad">
      <div class="banner success">🎉 Approved by ${esc((r.hrDecision&&r.hrDecision.decidedBy)||'HR')} on ${r.hrDecision?fmtDate(r.hrDecision.decidedDate):''}${r.hrDecision&&r.hrDecision.comments?'<br>Note: '+esc(r.hrDecision.comments):''}</div>
      <p style="font-size:13px;margin:10px 0 8px">Next step: prepare and send the offer letter to the hiring manager.</p>
      <button class="btn btn-primary" onclick="App.showOfferLetterModal()">📄 Prepare offer letter →</button>
    </div>`;
  if(r.status==='offer_sent')
    return `<div class="card card-pad">
      <div class="banner success">📄 Offer letter sent on ${r.offerLetter?fmtDate(r.offerLetter.sentAt):'—'}.</div>
      <button class="btn btn-sm" style="margin-top:8px" onclick="App.showOfferLetterModal()">View / Resend offer letter</button>
    </div>`;
  if(r.status!=='interview_rated')
    return `<div class="banner info">Current stage: <strong>${STAGE_LABELS[r.status]||r.status}</strong>. No HR action needed yet.</div>`;
  return `<div class="card card-pad">
    <div class="banner warn">🕒 Pending your decision. Review the rating sheet, application and documents below.</div>
    <div class="field"><label>Decision notes / comments</label><textarea id="hrComments"></textarea></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="App.hrDecide('approved')">Approve &amp; finalise offer</button>
      <button class="btn btn-red" onclick="App.hrDecide('rejected')">Reject</button>
    </div></div>`;
}
function hrDecide(decision){
  const comments=(document.getElementById('hrComments')||{}).value||'';
  REC.status=decision; REC.hrDecision={decision,comments,decidedBy:'HR / Admin',decidedDate:Date.now()};
  const subj=decision==='approved'
    ?`Congratulations — offer approved for ${REC.position} at Adonis Laboratories`
    :`Update on your application for ${REC.position} at Adonis Laboratories`;
  addNotif(REC, REC.email, subj, decision);
  addNotif(REC, 'Hiring Manager', `HR has ${decision==='approved'?'approved':'rejected'} ${REC.name} for ${REC.position}`, decision);
  saveRec(); render();
}

function renderCandidateEntry(){
  document.getElementById('app').innerHTML=`
    <div class="page-head"><div><span class="eyebrow">Candidate</span><h1>Welcome to Pravesh</h1><div class="sub">Enter the access code shared by your recruiter.</div></div></div>
    <div class="card card-pad" style="max-width:420px">
      <div class="field"><label>Access code</label>
        <input type="text" id="accessInput" placeholder="6-character code" style="text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-size:18px;text-align:center">
      </div>
      <button class="btn btn-primary btn-block" onclick="App.candidateAccess()">Continue →</button>
      <p class="micro" style="margin-top:10px">Don't have a code? Contact the recruiter who reached out to you.</p>
    </div>`;
  const el=document.getElementById('accessInput');
  el.focus();
  el.addEventListener('keydown',e=>{if(e.key==='Enter') App.candidateAccess();});
}

function candidateAccess(){
  const el=document.getElementById('accessInput');
  const code=el.value.trim().toUpperCase();
  if(!code){ toast('Please enter your access code','⚠️'); return; }
  // look up in in-memory DB first (always reliable)
  const rec=DB.candidates[code];
  if(!rec){ toast('Code not found. Please check the code and try again. If the problem persists, ask your recruiter.','❌'); return; }
  REC=rec;
  if(!REC.application.position) REC.application.position=REC.position;
  if(!REC.application.source)   REC.application.source=REC.source;
  VIEW.screen = REC.status==='invited' ? 'wizard' : 'status';
  VIEW.step=0;
  render();
}
function exitCandSession(){ REC=null; VIEW.screen='entry'; VIEW.step=0; render(); }

function renderCandidateWizard(){
  const step=WIZ[VIEW.step];
  document.getElementById('app').innerHTML=`
    <div class="page-head">
      <div><span class="eyebrow">Your Application</span><h1>${esc(REC.name)}</h1><div class="sub">${esc(REC.position)} · Code ${REC.id}</div></div>
      <button class="btn btn-ghost" onclick="App.exitCandSession()">Exit</button>
    </div>
    ${stepperHTML(REC.status)}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)">
      ${WIZ.map((s,i)=>`<span style="font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;background:${i===VIEW.step?'var(--teal-deep)':i<VIEW.step?'var(--green-bg)':'var(--paper)'};color:${i===VIEW.step?'white':i<VIEW.step?'var(--green)':'var(--slate)'};border:1px solid ${i===VIEW.step?'var(--teal-deep)':i<VIEW.step?'#BCE0CB':'var(--line)'}">${i+1}. ${s.title}</span>`).join('')}
    </div>
    <div class="card card-pad" id="wizCont">${step.render()}</div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn" ${VIEW.step===0?'disabled':''} onclick="App.wizPrev()">← Back</button>
      ${VIEW.step===WIZ.length-1
        ?`<button class="btn btn-primary" onclick="App.submitApp()">Submit application →</button>`
        :`<button class="btn btn-primary" onclick="App.wizNext()">Save &amp; continue →</button>`}
    </div>`;
  const cont=document.getElementById('wizCont');
  bindForm(cont, REC.application, debouncedSave);
  fillForm(cont, REC.application);
}

function wizNext(){ if(VIEW.step<WIZ.length-1){ VIEW.step++; saveRec(); render(); } }
function wizPrev(){ if(VIEW.step>0){ VIEW.step--; render(); } }
function addRow(path,tpl){ const a=getDeep(REC.application,path)||[]; a.push(JSON.parse(JSON.stringify(tpl))); setDeep(REC.application,path,a); saveRec(); render(); }
function removeRow(path,i){ const a=getDeep(REC.application,path)||[]; a.splice(i,1); setDeep(REC.application,path,a); saveRec(); render(); }
function attachDoc(e,key){ const f=e.target.files[0]; if(!f) return; REC.documents[key]={fileName:f.name,size:f.size,uploadedAt:Date.now()}; saveRec(); render(); }

function submitApp(){
  const a=REC.application, d=a.declarationChecks||{};
  if(!a.personal||!a.personal.fullName){ toast('Please complete your personal details first.','⚠️'); VIEW.step=1; render(); return; }
  if(!(d.allDisclosed&&d.lettersSubmitted&&d.salesAuthentic&&d.consentVerification)){ toast('Please confirm all declaration checkboxes.','⚠️'); VIEW.step=WIZ.findIndex(s=>s.id==='declaration'); render(); return; }
  if(!a.signature){ toast('Please type your full name as your signature.','⚠️'); VIEW.step=WIZ.findIndex(s=>s.id==='declaration'); render(); return; }
  REC.status='submitted';
  addNotif(REC,'Hiring Manager',`New application submitted by ${REC.name} for ${REC.position}`,'submitted');
  saveRec(); VIEW.screen='done'; render();
}

  prev.style.cssText='position:fixed;inset:0;background:rgba(11,30,35,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  prev.innerHTML=`<div style="background:white;border-radius:14px;max-width:680px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">

      </div>
    </div>
    <div style="padding:24px 28px">
      <pre id="offerPreviewText" style="white-space:pre-wrap;font-family:Georgia,serif;font-size:13px;line-height:1.7;color:#111;margin:0">${esc(text)}</pre>
    </div>
  </div>`;
  document.body.appendChild(prev);
  // store for copy

}

function copyOfferText(){
  const text = window._currentOfferText || '';
  navigator.clipboard.writeText(text).then(()=>toast('Offer letter text copied!','📋')).catch(()=>toast('Select all text in the preview and copy manually','⚠️'));
}

function sendOffer(){
  const ol=readOfferForm();
  if(!ol.mgrEmail){ toast('Please enter the hiring manager email address','⚠️'); return; }
  if(!ol.ctcOffered||!ol.joiningDate||!ol.designation){ toast('Please fill in Designation, Date of Joining and CTC before sending','⚠️'); return; }
  REC.offerLetter={...ol, sentAt:Date.now()};
  REC.status='offer_sent';
  const letterText=buildOfferLetterText(ol, REC);
  window._currentOfferText=letterText;
  const subject=`Offer Letter — ${ol.candidateName} | ${ol.designation} | Adonis Laboratories`;
  const mailSubject=encodeURIComponent(subject);
  const mailBody=encodeURIComponent(letterText);
  const mailtoMgr=`mailto:${ol.mgrEmail}?cc=${REC.email}&subject=${mailSubject}&body=${mailBody}`;
  addNotif(REC, ol.mgrEmail, `Offer letter issued — ${ol.candidateName} for ${ol.designation}`, 'offer_sent');
  addNotif(REC, REC.email,   `Offer letter from Adonis Laboratories — ${ol.designation}`,       'offer_sent');
  saveRec();
  const doShow=(emailSentToMgr, emailSentToCand)=>{
    const root=ensureModalRoot();
    root.innerHTML=`<div class="modal-overlay">
      <div class="modal">
        <div class="modal-head"><h3>Offer letter ${(emailSentToMgr||emailSentToCand)?'sent ✓':'ready'}</h3><button class="x-close" onclick="App.closeModalAndRefresh()">×</button></div>
        <div class="modal-body">
          ${emailSentToMgr?`<div class="banner success">✅ Offer letter emailed to hiring manager <strong>${esc(ol.mgrEmail)}</strong>.</div>`:''}
          ${emailSentToCand?`<div class="banner success" style="margin-top:8px">✅ Copy sent to candidate <strong>${esc(REC.email)}</strong>.</div>`:''}
          ${(!emailSentToMgr&&!emailSentToCand)?`<div class="banner warn">⚠️ ${DB.emailConfig.configured?'EmailJS send failed.':'EmailJS not configured.'} Use the options below to send manually.</div>`:''}
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
            ${!emailSentToMgr?`<a href="${mailtoMgr}" class="btn" style="text-decoration:none" target="_blank">📧 Open email client</a>`:''}
            <button class="btn" onclick="App.previewOffer()">👁 Preview letter</button>
            <button class="btn" onclick="navigator.clipboard.writeText(window._currentOfferText||'').then(()=>App._toast('Copied!','📋'))">📋 Copy letter</button>
          </div>
        </div>
        <div class="modal-foot"><button class="btn btn-primary" onclick="App.closeModalAndRefresh()">Done</button></div>
      </div>
    </div>`;
  };
  if(DB.emailConfig.configured){
    closeModal();
    // send to manager, then candidate
    sendEmailJS(ol.mgrEmail, subject, letterText, ol.candidateName)
      .then(()=>sendEmailJS(REC.email, subject, letterText, ol.candidateName)
        .then(()=>doShow(true,true))
        .catch(()=>doShow(true,false))
      )
      .catch(err=>{ toast('Email failed: '+err.text,'❌'); doShow(false,false); });
  } else {
    doShow(false,false);
  }
}

let _bulkRows = [];

function parseMgrExcel(e){
  const file = e.target.files[0];
  if(!file){ return; }
  if(!window.XLSX){ toast('SheetJS library not loaded. Please refresh and try again.','⚠️'); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if(rows.length < 2){ showBulkError('The file appears to be empty or has only a header row.'); return; }

      // detect header row — find column indices
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      const nameIdx  = header.findIndex(h=>h.includes('name'));
      const userIdx  = header.findIndex(h=>h.includes('id')||h.includes('username')||h.includes('user'));
      const passIdx  = header.findIndex(h=>h.includes('pass'));

      if(nameIdx===-1||userIdx===-1||passIdx===-1){
        showBulkError('Could not find required columns. Please ensure your file has columns: Full Name, Manager ID (Username), Password.');
        return;
      }

      _bulkRows = [];
      const existingUsernames = new Set(Object.values(DB.managers).map(m=>m.username.toLowerCase()));
      const seenInFile = new Set();
      const errors = [];

      rows.slice(1).forEach((row, idx)=>{
        const name     = String(row[nameIdx]||'').trim();
        const username = String(row[userIdx]||'').trim();
        const password = String(row[passIdx]||'').trim();
        const rowNum   = idx + 2;

        if(!name && !username && !password) return; // blank row
        let rowErrors = [];
        if(!name)     rowErrors.push('Name missing');
        if(!username) rowErrors.push('Manager ID missing');
        if(!password) rowErrors.push('Password missing');
        if(username && existingUsernames.has(username.toLowerCase())) rowErrors.push('Manager ID already exists in system');
        if(username && seenInFile.has(username.toLowerCase())) rowErrors.push('Duplicate in this file');
        if(username) seenInFile.add(username.toLowerCase());

        _bulkRows.push({rowNum, name, username, password, errors:rowErrors, willImport:rowErrors.length===0});
      });

      if(_bulkRows.length===0){ showBulkError('No data rows found in the file.'); return; }

      const good  = _bulkRows.filter(r=>r.willImport);
      const skipped = _bulkRows.filter(r=>!r.willImport);

      const preview = document.getElementById('bulkPreview');
      const confirmBtn = document.getElementById('confirmBulkBtn');
      if(!preview) return;

      preview.innerHTML=`
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 10px">
          <div class="badge badge-approved">✓ ${good.length} will be imported</div>
          ${skipped.length ? `<div class="badge badge-rejected">⚠ ${skipped.length} skipped</div>` : ''}
        </div>
        <div style="max-height:280px;overflow-y:auto;border:1px solid var(--line);border-radius:8px">
        <table class="tbl" style="margin:0">
          <thead><tr><th>Row</th><th>Full name</th><th>Manager ID</th><th>Password</th><th>Status</th></tr></thead>
          <tbody>
            ${_bulkRows.map(r=>`<tr style="background:${r.willImport?'':'var(--red-bg)'}">
              <td class="micro">${r.rowNum}</td>
              <td>${esc(r.name||'—')}</td>
              <td><span style="font-family:monospace;font-weight:700">${esc(r.username||'—')}</span></td>
              <td><span style="font-family:monospace;color:var(--slate)">${r.password?'••••••':'—'}</span></td>
              <td>${r.willImport
                ? '<span style="color:var(--green);font-weight:700;font-size:12px">✓ Ready</span>'
                : `<span style="color:var(--red-text);font-size:11.5px">⚠ ${esc(r.errors.join('; '))}</span>`}
              </td>
            </tr>`).join('')}
          </tbody>
        </table></div>`;

      if(good.length > 0){
        confirmBtn.style.display='';
        confirmBtn.textContent = `Import ${good.length} account${good.length>1?'s':''}`;
      } else {
        confirmBtn.style.display='none';
        preview.innerHTML += `<div class="banner danger" style="margin-top:10px">No valid rows to import. Please fix the errors and re-upload.</div>`;
      }
    }catch(err){
      showBulkError('Could not read the file. Please make sure it is a valid .xlsx or .xls file. Error: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showBulkError(msg){
  const preview = document.getElementById('bulkPreview');
  if(preview) preview.innerHTML=`<div class="banner danger" style="margin-top:10px">❌ ${esc(msg)}</div>`;
  const btn = document.getElementById('confirmBulkBtn');
  if(btn) btn.style.display='none';
  _bulkRows=[];
}

async function confirmBulkImport(){
  const good = _bulkRows.filter(r=>r.willImport);
  if(!good.length){ toast('Nothing to import','⚠️'); return; }
  
  toast('Importing accounts, please wait...', '⏳');
  document.getElementById('confirmBulkBtn').disabled = true;
  document.getElementById('confirmBulkBtn').innerText = 'Importing...';

  let imported = 0;
  let skipped = 0;
  
  const promises = good.map(async r => {
    const id = genId();
    const email = r.email || `${r.username}@example.com`;
    const record = {id, name:r.name, username:r.username, password:r.password, email, createdAt:Date.now()};
    const res = await persistManager(record);
    if (res.success) {
      DB.managers[id] = record;
      imported++;
    } else {
      if (res.error && res.error.code === '23505') {
        // Unique violation (username exists)
        skipped++;
      } else {
        console.error('Failed to import manager:', r.username, res.error);
      }
    }
  });

  await Promise.all(promises);

  if (imported > 0) {
    toast(`${imported} manager account${imported>1?'s':''} imported successfully`,'✅');
  }
  if (skipped > 0) {
    toast(`${skipped} managers skipped (already exist)`,'ℹ️');
  }
  if (imported === 0 && skipped === 0) {
    toast(`Failed to import managers. Check console.`,'❌');
  }
  
  _bulkRows=[];
  closeModal();
  render();
}

(async function boot(){
  await loadFromStorage();
  // Handle deep-link hash: #candidate/CODE
  const hash = window.location.hash;
  const m = hash.match(/^#candidate\/([A-Z0-9]{6})$/i);
  if(m){
    const code = m[1].toUpperCase();
    const rec = DB.candidates[code];
    if(rec){
      REC = rec;
      if(!REC.application.position) REC.application.position = REC.position;
      if(!REC.application.source)   REC.application.source   = REC.source;
      VIEW.role   = 'candidate';
      VIEW.screen = REC.status === 'invited' ? 'wizard' : 'status';
      VIEW.step   = 0;
    } else {
      // code not yet in memory (cold load) — show entry with pre-filled code
      VIEW.role   = 'candidate';
      VIEW.screen = 'entry';
      setTimeout(()=>{
        const el = document.getElementById('accessInput');
        if(el){ el.value = code; }
      }, 100);
    }
  }
  render();
  // after render, if we had a cold-load code, fill the input
  if(m && VIEW.screen==='entry'){
    const el = document.getElementById('accessInput');
    if(el) el.value = m[1].toUpperCase();
  }
})();
